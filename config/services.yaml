services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'
            $csrfTokenName: '%contao.csrf_token_name%'
            # IMAP DSN of the bounce mailbox; empty/unset turns the bounce collector off.
            $bounceImapDsn: '%env(default::WORKFLOW_BOUNCE_IMAP_DSN)%'

    Psimandl\WorkflowBundle\:
        resource: ../src/
        exclude:
            - ../src/ContaoWorkflowBundle.php
            - ../src/ContaoManager/
            - ../src/Model/
            # Plain value objects, never resolved from the container.
            - ../src/Service/Bounce/BounceReport.php
            - ../src/Service/Bounce/BounceOutcome.php
            - ../src/Excel/NumberFormat.php
            - ../src/Excel/ColumnCheckResult.php
            # Instantiated by Contao as a BE_MOD callback, not via the container.
            - ../src/Controller/Backend/DashboardModule.php

    # Controllers need to be public so the router/back end can resolve them.
    Psimandl\WorkflowBundle\Controller\:
        resource: ../src/Controller/
        public: true
        exclude:
            - ../src/Controller/Backend/DashboardModule.php

    # Accessed from the (non-service) back end dashboard module via the container.
    Psimandl\WorkflowBundle\Service\WorkflowStatus:
        public: true

    # Read by the (non-service) back end dashboard module for the bounce-detection banner.
    Psimandl\WorkflowBundle\Service\Bounce\BounceHealth:
        public: true

    Psimandl\WorkflowBundle\Service\WorkflowValidator:
        public: true

    # Used from the no-ctor AnswerConfigListener (MCW callback) via the container.
    Psimandl\WorkflowBundle\Service\SpreadsheetInspector:
        public: true

    # Pulled from the no-ctor AnswerConfigListener via the container for the number-column
    # check – private services are inlined away in the compiled prod container.
    Psimandl\WorkflowBundle\Excel\ColumnFormatAnalyzer:
        public: true

    Psimandl\WorkflowBundle\Excel\ColumnCompatibility:
        public: true

    # Accessed from the (non-service) back end dashboard module via the container
    # (and injected into PdfGenerator for the signature name).
    Psimandl\WorkflowBundle\Service\PersonNameResolver:
        public: true

    # DCA callback class for the answer-field / PDF-rule child tables, referenced
    # by class name in tl_workflow*.php and resolved via System::importStatic() by
    # Contao core, MultiColumnWizard and dcaWizard. Must be public, otherwise
    # importStatic() fails on the inlined private service in the compiled prod
    # container ("service has been removed or inlined").
    Psimandl\WorkflowBundle\EventListener\DataContainer\AnswerConfigListener:
        public: true

    # DCA button_callback for the workflow list "download configuration" operation,
    # referenced by class name and resolved via System::importStatic() – must be public.
    Psimandl\WorkflowBundle\EventListener\DataContainer\ConfigExportListener:
        public: true

    # DCA input_field_callback for the PDF/form preview buttons, referenced by class
    # name and resolved via System::importStatic() – must be public.
    Psimandl\WorkflowBundle\EventListener\DataContainer\PreviewButtonListener:
        public: true

    # DCA input_field_callback for the "reset all participants" button, referenced by
    # class name and resolved via System::importStatic() – must be public.
    Psimandl\WorkflowBundle\EventListener\DataContainer\ResetButtonListener:
        public: true


    # DCA button_callback for the workflow delete operation (PDF-aware confirmation),
    # referenced by class name and resolved via System::importStatic() – must be public.
    Psimandl\WorkflowBundle\EventListener\DataContainer\WorkflowDeleteListener:
        public: true
